[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crypto-composite-market-data"
version = "0.3.0"
description = "Public multi-exchange crypto market-data composite toolkit."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "thanhlq8-max" }]
license = "Apache-2.0"
keywords = ["crypto", "market-data", "orderbook", "ohlcv", "binance", "okx", "bybit"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Information Analysis",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "requests>=2.31",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
crypto-composite = "crypto_composite.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
